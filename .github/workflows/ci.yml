name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: grandpasson
          MYSQL_ROOT_PASSWORD: devrootpass
          MYSQL_USER: grandpasson
          MYSQL_PASSWORD: devpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pdevrootpass"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_mysql, openssl, curl, json, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check migration trees match
        run: make check-migrations

      - name: Prepare env
        run: |
          cp .env.example .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=devpass/' .env

      - name: Apply migrations
        run: php cron/migrate.php
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: grandpasson
          DB_USER: grandpasson
          DB_PASSWORD: devpass

      - name: PHPUnit
        run: php vendor/bin/phpunit
        env:
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_PORT: 3306
          TEST_DB_NAME: grandpasson
          TEST_DB_USER: root
          TEST_DB_PASS: devrootpass

  build:
    name: Build release zip
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build artifact
        run: make build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grandpasson-release
          path: grandpasson-release.zip
          if-no-files-found: error

  release:
    name: Attach zip to GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: grandpasson-release

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: grandpasson-release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
